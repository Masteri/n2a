server {
    listen 80 default_server;
    server_name _;

    auth_basic "Recordings";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Asterisk monitor recordings live under freepbx_var_data:/var/spool/asterisk/monitor
    # The volume is mounted at /srv inside this container.
    root /srv/spool/asterisk/monitor;
    autoindex off;

    # WAVs only — anything else 404s.
    location ~* "\.wav$" {
        try_files $uri =404;
        add_header Content-Disposition 'attachment; filename="$uri"';
    }

    # block everything else
    location / { return 404; }
}
