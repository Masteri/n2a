config_version: 6
active_pipeline: default
default_provider: openai_realtime
audio_transport: audiosocket
audiosocket:
  format: slin
  host: 172.30.0.1
  port: 8090
  advertise_host: 172.30.0.1
downstream_mode: stream
contexts:
  default:
    greeting: Hello, you've reached Ava. How can I help you today?
    profile: openai_realtime_24k
    prompt: You are Ava, a Helpful receptionist for our company. Be concise, friendly,
      and professional. If a caller wants to schedule a meeting, request a demo, or
      speak with a specific person, capture their name, phone number, and reason for
      calling. Confirm details before ending. Keep responses under three sentences
      when possible. Speak naturally and listen carefully.
    provider: openai_realtime
  demo_openai:
    greeting: Hi! I'm Ava running on OpenAI Realtime API. I'm fast and natural-sounding.
      What would you like to know about this project?
    prompt: You are Ava (Asterisk Voice Agent) demonstrating OpenAI Realtime. Be helpful,
      conversational, and explain features clearly in 5-10 sentences.
    profile: openai_realtime_24k
    provider: openai_realtime
barge_in:
  enabled: true
  energy_threshold: 700
  initial_protection_ms: 100
  min_ms: 150
  post_tts_end_protection_ms: 100
vad:
  enhanced_enabled: true
  fallback_buffer_size: 128000
  fallback_enabled: true
  fallback_interval_ms: 4000
  max_utterance_duration_ms: 10000
  min_utterance_duration_ms: 600
  use_provider_vad: false
  utterance_padding_ms: 200
  webrtc_aggressiveness: 1
  webrtc_end_silence_frames: 50
  webrtc_start_frames: 3
streaming:
  chunk_size_ms: 20
  connection_timeout_ms: 120000
  continuous_stream: true
  empty_backoff_ticks_max: 5
  fallback_timeout_ms: 8000
  greeting_min_start_ms: 40
  jitter_buffer_ms: 950
  keepalive_interval_ms: 5000
  low_watermark_ms: 80
  min_start_ms: 120
  normalizer:
    enabled: true
    max_gain_db: 18.0
    target_rms: 1400
  provider_grace_ms: 500
  sample_rate: 8000
profiles:
  default: telephony_responsive
  openai_realtime_24k:
    chunk_ms: 20
    idle_cutoff_ms: 0
    internal_rate_hz: 24000
    provider_pref:
      input_encoding: pcm16
      input_sample_rate_hz: 24000
      output_encoding: pcm16
      output_sample_rate_hz: 24000
    transport_out:
      encoding: slin
      sample_rate_hz: 8000
  telephony_responsive:
    chunk_ms: auto
    idle_cutoff_ms: 600
    internal_rate_hz: 8000
    provider_pref:
      input_encoding: mulaw
      input_sample_rate_hz: 8000
      output_encoding: mulaw
      output_sample_rate_hz: 8000
    transport_out:
      encoding: slin
      sample_rate_hz: 8000
providers:
  openai_realtime:
    base_url: wss://api.openai.com/v1/realtime
    egress_pacer_enabled: true
    egress_pacer_warmup_ms: 320
    enabled: true
    greeting: ${OPENAI_GREETING:-Hello, how can I help you today?}
    input_encoding: ulaw
    input_sample_rate_hz: 8000
    instructions: You are a concise voice assistant. Respond clearly and keep answers
      under 20 words unless more detail is requested.
    api_version: beta
    model: gpt-4o-realtime-preview-2024-12-17
    organization: ''
    output_encoding: linear16
    output_sample_rate_hz: 24000
    provider_input_encoding: linear16
    provider_input_sample_rate_hz: 24000
    response_modalities:
    - audio
    - text
    target_encoding: mulaw
    target_sample_rate_hz: 8000
    turn_detection:
      create_response: true
      prefix_padding_ms: 200
      silence_duration_ms: 200
      threshold: 0.5
      type: server_vad
    voice: alloy
  google_live:
    enabled: false
  deepgram:
    enabled: false
  minimax_llm:
    enabled: false
  elevenlabs_agent:
    enabled: false
  elevenlabs_tts:
    enabled: false
  groq_llm:
    enabled: false
  groq_stt:
    enabled: false
  groq_tts:
    enabled: false
  azure_stt:
    enabled: false
  azure_tts:
    enabled: false
  openai_stt:
    enabled: true
  openai_tts:
    enabled: true
  ollama_llm:
    enabled: false
  native_llm:
    enabled: false
  openai_llm:
    enabled: true
  local_llm:
    enabled: false
  local_stt:
    enabled: false
  local_tts:
    enabled: false
  local:
    enabled: true
llm:
  initial_greeting: Hello, how can I help you today?
  prompt: Voice assistant. Answer in 5-8 words. Be direct. Expand only if asked.
pipelines:
  default:
    stt: openai_stt
    llm: openai_llm
    tts: openai_tts
    tools: []
asterisk:
  app_name: asterisk-ai-voice-agent
external_media:
  codec: ulaw
  direction: both
  port_range: 18080:18099
  rtp_host: 172.30.0.1
  rtp_port: 18080
  advertise_host: 172.30.0.1
