; =============================================================================
; n8n call logger - posts call data to n8n on hangup.
; Edit /srv/docker/freepbx/dialplan/extensions_custom.conf on the host
; (volume-mounted). After edits: dialplan reload.
; =============================================================================

; --- Hangup handler subroutine ---
[freepbx-n8n-logger]
exten => s,1,NoOp(n8n logger fired uniqueid=${UNIQUEID} direction=${ARG1})
 same => n,System(/etc/asterisk/scripts/n8n-call-logger.sh "${UNIQUEID}" "${CDR(src)}" "${CDR(dst)}" "${CALLERID(num)}" "${CDR(billsec)}" "${CDR(disposition)}" "${CDR(start)}" "${ARG1}")
 same => n,Return()

; --- FreePBX 17 hook names. Verified against extensions_additional.conf 2026-05-08.
; --- macro-dial-one calls dialout-one-predial-hook for both internal and outbound dials. ---
[macro-dialout-one-predial-hook]
exten => s,1,NoOp(*** n8n predial-hook fired - dialout-one ***)
 same => n,System(echo "$(date '+%F %T') dialout-one predial-hook hit; uniqueid=${UNIQUEID}; chan=${CHANNEL}" >> /var/log/asterisk/n8n-hook.log)
 same => n,Set(CHANNEL(hangup_handler_push)=freepbx-n8n-logger,s,1(outbound))

[macro-dial-ringall-predial-hook]
exten => s,1,NoOp(*** n8n predial-hook fired - ringall ***)
 same => n,System(echo "$(date '+%F %T') ringall predial-hook hit; uniqueid=${UNIQUEID}; chan=${CHANNEL}" >> /var/log/asterisk/n8n-hook.log)
 same => n,Set(CHANNEL(hangup_handler_push)=freepbx-n8n-logger,s,1(inbound))

[macro-dial-hunt-predial-hook]
exten => s,1,NoOp(*** n8n predial-hook fired - hunt ***)
 same => n,System(echo "$(date '+%F %T') hunt predial-hook hit; uniqueid=${UNIQUEID}; chan=${CHANNEL}" >> /var/log/asterisk/n8n-hook.log)
 same => n,Set(CHANNEL(hangup_handler_push)=freepbx-n8n-logger,s,1(inbound))

; =============================================================================
; n8n-test-caller - synthetic originator with a hardcoded caller ID.
; Use:  channel originate Local/start@n8n-test-caller application Hangup
; To change CID/extension, edit the Set/Goto lines below and reload dialplan.
; =============================================================================
; Synthetic test that does NOT require a registered SIP device. It attaches the
; hangup handler directly, sets caller ID, dials PJSIP/1001 (which returns
; CHANUNAVAIL since nothing is registered) and hangs up. The handler then fires
; against the real channel — proving the script → n8n → HubSpot path with an
; actual Asterisk-driven hangup. To run:
;   asterisk -rx "channel originate Local/start@n8n-test-caller application Wait 30"
[n8n-test-caller]
exten => start,1,NoOp(synthetic test call CID=15550007777 ext=1001)
 same => n,Set(CALLERID(num)=15550007777)
 same => n,Set(CALLERID(name)=n8n E2E Test)
 same => n,Set(CDR(src)=15550007777)
 same => n,Set(CDR(dst)=1001)
 same => n,Set(CHANNEL(hangup_handler_push)=freepbx-n8n-logger,s,1(inbound))
 same => n,Dial(PJSIP/1001,8)
 same => n,Hangup()

; =============================================================================
; from-ai-agent — hands the call to AVA via Stasis. Attach hangup handler first
; so HubSpot still gets logged when AVA disconnects.
;
; Useful as the destination of an Inbound Route, an Outbound Route extension,
; or a Misc Application (FreePBX UI -> Applications -> Misc Applications ->
; Custom Destination "from-ai-agent,s,1").
;
; Channel variables you can set BEFORE Stasis() to drive AVA per-call:
;   AI_CONTEXT  — selects the AVA "context" from config/ai-agent.local.yaml
;   AI_PROVIDER — overrides the provider (openai_realtime / deepgram / ...)
; =============================================================================
[from-ai-agent]
exten => s,1,NoOp(=== handoff to AVA AI Voice Agent ===)
 same => n,Set(CHANNEL(hangup_handler_push)=freepbx-n8n-logger,s,1(ai-agent))
 ; Record both legs. Third arg fires on recording-stopped (after Asterisk flushes the WAV).
 same => n,MixMonitor(${UNIQUEID}.wav,b,/etc/asterisk/scripts/n8n-recording-uploader.sh ${UNIQUEID})
 same => n,Answer()
 same => n,Stasis(asterisk-ai-voice-agent)
 same => n,Hangup()

; =============================================================================
; n8n-ai-test-caller — synthetic originator that routes to AVA. AVA picks up via
; ARI Stasis, plays the configured greeting, runs the conversation pipeline,
; then hangs up. Hangup handler fires -> /etc/asterisk/scripts/n8n-call-logger.sh
; -> n8n webhook -> HubSpot Call engagement.
;
; Originate with:
;   channel originate Local/start@n8n-ai-test-caller application Wait 60
; =============================================================================
[n8n-ai-test-caller]
exten => start,1,NoOp(synthetic AI test CID=15550006666 -> AVA Stasis)
 same => n,Set(CALLERID(num)=15550006666)
 same => n,Set(CALLERID(name)=n8n AI E2E Test)
 same => n,Set(CDR(src)=15550006666)
 same => n,Set(CDR(dst)=ai-agent)
 same => n,Goto(from-ai-agent,s,1)

; =============================================================================
; *99 feature code — any registered SIP extension can dial *99 to talk to AVA.
; FreePBX automatically includes from-internal-custom inside from-internal,
; so this is reachable from any registered phone.
; =============================================================================
[from-internal-custom]
exten => *99,1,NoOp(*99 -> AVA via from-ai-agent)
 ; Override caller ID for testing so HubSpot search hits a known test contact.
 ; Remove these two lines for production calls — real caller ID will pass through.
 same => n,Set(CALLERID(num)=15551001001)
 same => n,Set(CALLERID(name)=AVA E2E test caller)
 same => n,Goto(from-ai-agent,s,1)

; *98 — pure recording path (no AVA). Proves Phase 1 + Phase 2 transcription
; works for any call, AI or not. Caller ID forced for testing alignment with
; the HubSpot test contact.
exten => *98,1,NoOp(*98 -> recording-only test)
 same => n,Set(CALLERID(num)=15551001001)
 same => n,Set(CALLERID(name)=Recording E2E test)
 same => n,Set(CHANNEL(hangup_handler_push)=freepbx-n8n-logger,s,1(recording-test))
 same => n,Answer()
 same => n,MixMonitor(${UNIQUEID}.wav,,/etc/asterisk/scripts/n8n-recording-uploader.sh ${UNIQUEID})
 ; Play Asterisk's built-in demo prompt - guaranteed audio for MixMonitor regardless
 ; of whether baresip's RTP reaches us. Then read 15s of caller audio (mixed in too).
 same => n,Playback(demo-congrats)
 same => n,Playback(demo-thanks)
 same => n,Read(_unused,beep,15,,1,15)
 same => n,Hangup()
